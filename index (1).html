<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DSA Tracker — NeetCode 150</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1e1e1e;
      --border: #2a2a2a;
      --border2: #333;
      --text: #f0f0f0;
      --muted: #666;
      --muted2: #888;
      --green: #00e676;
      --green-dim: #00e67620;
      --green-border: #00e67640;
      --red: #ff5252;
      --red-dim: #ff525220;
      --amber: #ffab40;
      --amber-dim: #ffab4020;
      --blue: #448aff;
      --blue-dim: #448aff20;
      --mono: 'Space Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.6;
    }

    /* Header */
    header {
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }
    .logo {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--green);
      letter-spacing: 0.08em;
    }
    .logo span { color: var(--muted); }
    .header-right {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }
    .header-right strong { color: var(--text); }

    /* Layout */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 2.5rem 2rem 4rem;
    }

    /* Stats */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 2.5rem;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.2rem 1.2rem 1rem;
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }
    .stat-card.green::before { background: var(--green); }
    .stat-card.red::before { background: var(--red); }
    .stat-card.amber::before { background: var(--amber); }
    .stat-card.blue::before { background: var(--blue); }
    .stat-label {
      font-size: 11px;
      color: var(--muted2);
      font-family: var(--mono);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .stat-value {
      font-family: var(--mono);
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
    }
    .stat-card.green .stat-value { color: var(--green); }
    .stat-card.red .stat-value { color: var(--red); }
    .stat-card.amber .stat-value { color: var(--amber); }
    .stat-card.blue .stat-value { color: var(--blue); }
    .stat-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* Progress bar */
    .progress-wrap {
      margin-bottom: 2.5rem;
    }
    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .progress-label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted2);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .progress-pct {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--green);
    }
    .progress-track {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--green);
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    /* Add form */
    .add-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    .add-title {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted2);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 1rem;
    }
    .add-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    input[type="text"], input[type="date"], select {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"] { flex: 1; min-width: 200px; }
    input[type="date"] { color-scheme: dark; cursor: pointer; }
    input[type="date"]:focus { border-color: var(--green); }
    input[type="text"]::placeholder { color: var(--muted); }
    input[type="text"]:focus, select:focus { border-color: var(--green); }
    select { cursor: pointer; }
    select option { background: var(--surface2); }

    .difficulty-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .diff-btn {
      font-family: var(--mono);
      font-size: 11px;
      padding: 5px 12px;
      border-radius: 4px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--muted2);
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.04em;
    }
    .diff-btn:hover { border-color: var(--muted2); color: var(--text); }
    .diff-btn.active-easy { border-color: var(--green); color: var(--green); background: var(--green-dim); }
    .diff-btn.active-medium { border-color: var(--amber); color: var(--amber); background: var(--amber-dim); }
    .diff-btn.active-hard { border-color: var(--red); color: var(--red); background: var(--red-dim); }

    .btn-add {
      font-family: var(--mono);
      font-size: 12px;
      padding: 9px 20px;
      background: var(--green);
      color: #000;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 700;
      letter-spacing: 0.04em;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .btn-add:hover { opacity: 0.88; }
    .btn-add:active { transform: scale(0.97); }

    /* Section headers */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      margin-top: 2rem;
    }
    .section-title {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted2);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .count-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 10px;
      padding: 2px 8px;
      color: var(--muted2);
    }
    .count-badge.red { border-color: var(--red); color: var(--red); background: var(--red-dim); }

    /* Filter row */
    .filter-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .filter-btn {
      font-family: var(--mono);
      font-size: 10px;
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--muted2);
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: all 0.15s;
    }
    .filter-btn:hover, .filter-btn.active {
      border-color: var(--green);
      color: var(--green);
      background: var(--green-dim);
    }

    /* Problem cards */
    .problem-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color 0.2s;
      animation: slideIn 0.2s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .problem-card:hover { border-color: var(--border2); }
    .problem-card.due-card { border-left: 3px solid var(--red); }
    .problem-card.new-card { border-left: 3px solid var(--green); }

    .p-info { flex: 1; min-width: 0; }
    .p-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .p-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 3px;
      flex-wrap: wrap;
    }
    .p-topic {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .p-date {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
    }

    /* Difficulty pill */
    .diff-pill {
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 3px;
      letter-spacing: 0.04em;
    }
    .diff-easy { color: var(--green); background: var(--green-dim); }
    .diff-medium { color: var(--amber); background: var(--amber-dim); }
    .diff-hard { color: var(--red); background: var(--red-dim); }

    /* Revision dots */
    .rev-dots {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .rev-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      border: 1px solid var(--border2);
      background: transparent;
    }
    .rev-dot.done { background: var(--green); border-color: var(--green); }

    /* Status badge */
    .status-badge {
      font-family: var(--mono);
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 4px;
      white-space: nowrap;
      letter-spacing: 0.03em;
    }
    .badge-due-today { color: var(--red); background: var(--red-dim); border: 1px solid var(--red); }
    .badge-overdue { color: var(--red); background: var(--red-dim); border: 1px solid var(--red); }
    .badge-soon { color: var(--amber); background: var(--amber-dim); border: 1px solid var(--amber); }
    .badge-upcoming { color: var(--muted2); background: var(--surface2); border: 1px solid var(--border); }
    .badge-complete { color: var(--green); background: var(--green-dim); border: 1px solid var(--green); }

    /* Buttons */
    .btn-revise {
      font-family: var(--mono);
      font-size: 11px;
      padding: 6px 12px;
      border: 1px solid var(--green-border);
      border-radius: 5px;
      background: var(--green-dim);
      color: var(--green);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-revise:hover { background: var(--green); color: #000; }

    .btn-delete {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 4px 6px;
      border-radius: 4px;
      font-size: 16px;
      line-height: 1;
      transition: color 0.15s;
    }
    .btn-delete:hover { color: var(--red); }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
      border: 1px dashed var(--border);
      border-radius: 8px;
      letter-spacing: 0.04em;
    }

    /* Topic legend */
    .topic-legend {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }
    .topic-chip {
      font-family: var(--mono);
      font-size: 10px;
      padding: 4px 10px;
      border-radius: 4px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted2);
      letter-spacing: 0.03em;
    }
    .topic-chip .chip-count {
      color: var(--text);
      font-weight: 700;
      margin-left: 5px;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--surface);
      border: 1px solid var(--green-border);
      color: var(--green);
      font-family: var(--mono);
      font-size: 12px;
      padding: 10px 16px;
      border-radius: 6px;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.25s;
      pointer-events: none;
      z-index: 100;
      letter-spacing: 0.04em;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    hr.divider { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }

    @media (max-width: 600px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      main { padding: 1.5rem 1rem 3rem; }
      header { padding: 0 1rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">DSA<span>/</span>TRACKER</div>
  <div class="header-right" id="header-date"></div>
</header>

<main>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card green">
      <div class="stat-label">Solved</div>
      <div class="stat-value" id="s-total">0</div>
      <div class="stat-sub">of 150 problems</div>
    </div>
    <div class="stat-card red">
      <div class="stat-label">Due today</div>
      <div class="stat-value" id="s-due">0</div>
      <div class="stat-sub">need revision</div>
    </div>
    <div class="stat-card amber">
      <div class="stat-label">Streak</div>
      <div class="stat-value" id="s-streak">0</div>
      <div class="stat-sub">days active</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-label">Mastered</div>
      <div class="stat-value" id="s-mastered">0</div>
      <div class="stat-sub">all revisions done</div>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-header">
      <span class="progress-label">NeetCode 150 Progress</span>
      <span class="progress-pct" id="progress-pct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <!-- Topic breakdown -->
  <div class="topic-legend" id="topic-legend"></div>

  <!-- Add problem -->
  <div class="add-section">
    <div class="add-title">+ Add solved problem</div>
    <div class="add-row">
      <input type="text" id="p-name" placeholder="Problem name (e.g. Two Sum)" />
      <input type="date" id="p-date" />
      <select id="p-topic">
        <option>Arrays &amp; Hashing</option>
        <option>Two Pointers</option>
        <option>Sliding Window</option>
        <option>Stack</option>
        <option>Binary Search</option>
        <option>Linked List</option>
        <option>Trees</option>
        <option>Tries</option>
        <option>Heap / Priority Queue</option>
        <option>Backtracking</option>
        <option>Graphs</option>
        <option>Dynamic Programming</option>
        <option>Greedy</option>
        <option>Other</option>
      </select>
      <button class="btn-add" onclick="addProblem()">ADD →</button>
    </div>
    <div class="difficulty-row">
      <span style="font-size:11px;color:var(--muted);font-family:var(--mono);letter-spacing:0.04em;margin-right:4px;">DIFFICULTY:</span>
      <button class="diff-btn active-easy" id="diff-easy" onclick="setDiff('easy')">Easy</button>
      <button class="diff-btn" id="diff-medium" onclick="setDiff('medium')">Medium</button>
      <button class="diff-btn" id="diff-hard" onclick="setDiff('hard')">Hard</button>
    </div>
  </div>

  <!-- Due today -->
  <div id="due-section">
    <div class="section-header">
      <div class="section-title">
        Revise today
        <span class="count-badge red" id="due-count">0</span>
      </div>
    </div>
    <div id="due-list"></div>
  </div>

  <hr class="divider" />

  <!-- All problems -->
  <div>
    <div class="section-header">
      <div class="section-title">
        All problems
        <span class="count-badge" id="all-count">0</span>
      </div>
    </div>
    <div class="filter-row" id="filter-row"></div>
    <div id="all-list"></div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script>
  const KEY = 'dsa_tracker_v2';
  let selectedDiff = 'easy';
  let activeFilter = 'All';

  function load() {
    try { return JSON.parse(localStorage.getItem(KEY)) || { problems: [], streak: 0, lastActive: null }; }
    catch(e) { return { problems: [], streak: 0, lastActive: null }; }
  }

  function save(data) {
    try { localStorage.setItem(KEY, JSON.stringify(data)); } catch(e) {}
  }

  function todayStr() {
    return new Date().toISOString().split('T')[0];
  }

  function addDays(str, n) {
    const d = new Date(str);
    d.setDate(d.getDate() + n);
    return d.toISOString().split('T')[0];
  }

  function diffDays(a, b) {
    return Math.round((new Date(b) - new Date(a)) / 86400000);
  }

  function setDiff(d) {
    selectedDiff = d;
    ['easy','medium','hard'].forEach(x => {
      const btn = document.getElementById('diff-' + x);
      btn.className = 'diff-btn' + (x === d ? ' active-' + x : '');
    });
  }

  function addProblem() {
    const name = document.getElementById('p-name').value.trim();
    if (!name) { showToast('Enter a problem name first'); return; }
    const topic = document.getElementById('p-topic').value;
    const today = todayStr();
    const solvedOn = document.getElementById('p-date').value || today;
    const data = load();

    if (data.problems.find(p => p.name.toLowerCase() === name.toLowerCase())) {
      showToast('Already added: ' + name); return;
    }

    const p = {
      id: Date.now(),
      name,
      topic,
      difficulty: selectedDiff,
      solvedOn: solvedOn,
      revisions: [addDays(solvedOn,3), addDays(solvedOn,7), addDays(solvedOn,14)],
      revisionsDone: 0
    };

    if (data.lastActive !== today) {
      data.streak = (data.lastActive === addDays(today,-1)) ? (data.streak||0)+1 : 1;
      data.lastActive = today;
    }

    data.problems.unshift(p);
    save(data);
    document.getElementById('p-name').value = '';
    showToast(name + ' added ✓');
    render();
  }

  function markRevised(id) {
    const data = load();
    const p = data.problems.find(x => x.id === id);
    if (p && p.revisionsDone < p.revisions.length) { p.revisionsDone++; }
    save(data);
    showToast('Revision marked ✓');
    render();
  }

  function deleteProblem(id) {
    const data = load();
    data.problems = data.problems.filter(x => x.id !== id);
    save(data);
    render();
  }

  function getDue(p) {
    if (p.revisionsDone >= p.revisions.length) return null;
    return p.revisions[p.revisionsDone];
  }

  function getStatusBadge(p) {
    const due = getDue(p);
    if (!due) return '<span class="status-badge badge-complete">Mastered</span>';
    const today = todayStr();
    const diff = diffDays(today, due);
    if (diff < 0) return '<span class="status-badge badge-overdue">Overdue ' + Math.abs(diff) + 'd</span>';
    if (diff === 0) return '<span class="status-badge badge-due-today">Due today</span>';
    if (diff <= 2) return '<span class="status-badge badge-soon">In ' + diff + 'd</span>';
    return '<span class="status-badge badge-upcoming">In ' + diff + 'd</span>';
  }

  function getDiffPill(d) {
    return '<span class="diff-pill diff-' + d + '">' + d.toUpperCase() + '</span>';
  }

  function getRevDots(p) {
    return p.revisions.map((_,i) => '<div class="rev-dot' + (i < p.revisionsDone ? ' done' : '') + '"></div>').join('');
  }

  function formatDate(str) {
    const d = new Date(str);
    return d.toLocaleDateString('en-IN', { day:'numeric', month:'short' });
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  function render() {
    const data = load();
    const probs = data.problems;
    const today = todayStr();

    // Header date
    document.getElementById('header-date').innerHTML =
      '<strong>' + new Date().toLocaleDateString('en-IN', {weekday:'short', day:'numeric', month:'short'}) + '</strong>';

    // Stats
    const dueProbs = probs.filter(p => { const d = getDue(p); return d && d <= today; });
    const mastered = probs.filter(p => p.revisionsDone >= p.revisions.length);
    document.getElementById('s-total').textContent = probs.length;
    document.getElementById('s-due').textContent = dueProbs.length;
    document.getElementById('s-streak').textContent = data.streak || 0;
    document.getElementById('s-mastered').textContent = mastered.length;
    document.getElementById('due-count').textContent = dueProbs.length;
    document.getElementById('all-count').textContent = probs.length;

    // Progress
    const pct = Math.round((probs.length / 150) * 100);
    document.getElementById('progress-pct').textContent = pct + '%';
    document.getElementById('progress-fill').style.width = pct + '%';

    // Topic legend
    const topicMap = {};
    probs.forEach(p => { topicMap[p.topic] = (topicMap[p.topic]||0)+1; });
    document.getElementById('topic-legend').innerHTML =
      Object.entries(topicMap).map(([t,c]) =>
        '<div class="topic-chip">' + t + '<span class="chip-count">' + c + '</span></div>'
      ).join('');

    // Due today
    const dueList = document.getElementById('due-list');
    if (dueProbs.length === 0) {
      dueList.innerHTML = '<div class="empty-state">NO REVISIONS DUE — KEEP SOLVING NEW PROBLEMS</div>';
    } else {
      dueList.innerHTML = dueProbs.map(p => `
        <div class="problem-card due-card">
          <div class="p-info">
            <div class="p-name">${p.name}</div>
            <div class="p-meta">
              <span class="p-topic">${p.topic}</span>
              ${getDiffPill(p.difficulty)}
              <div class="rev-dots">${getRevDots(p)}</div>
              <span class="p-date">Rev ${p.revisionsDone+1}/3</span>
            </div>
          </div>
          <button class="btn-revise" onclick="markRevised(${p.id})">DONE ✓</button>
          <button class="btn-delete" onclick="deleteProblem(${p.id})" title="Delete">×</button>
        </div>
      `).join('');
    }

    // Filter buttons
    const topics = ['All', ...new Set(probs.map(p => p.topic))];
    document.getElementById('filter-row').innerHTML = topics.map(t =>
      '<button class="filter-btn' + (t === activeFilter ? ' active' : '') + '" onclick="setFilter(\'' + t.replace(/'/g,"\\'").replace(/&amp;/g,'&') + '\')">' + t + '</button>'
    ).join('');

    // All problems
    let filtered = activeFilter === 'All' ? probs : probs.filter(p => p.topic === activeFilter);
    const allList = document.getElementById('all-list');
    if (filtered.length === 0) {
      allList.innerHTML = '<div class="empty-state">NO PROBLEMS YET — ADD YOUR FIRST PROBLEM ABOVE</div>';
    } else {
      allList.innerHTML = filtered.map(p => `
        <div class="problem-card ${p.solvedOn === today ? 'new-card' : ''}">
          <div class="p-info">
            <div class="p-name">${p.name}</div>
            <div class="p-meta">
              <span class="p-topic">${p.topic}</span>
              ${getDiffPill(p.difficulty)}
              <span class="p-date">Solved ${formatDate(p.solvedOn)}</span>
              <div class="rev-dots">${getRevDots(p)}</div>
            </div>
          </div>
          ${getStatusBadge(p)}
          <button class="btn-delete" onclick="deleteProblem(${p.id})" title="Delete">×</button>
        </div>
      `).join('');
    }
  }

  function setFilter(topic) {
    activeFilter = topic;
    render();
  }

  // Set default date to today
  const dateEl = document.getElementById('p-date');
  if (!dateEl.value) dateEl.value = todayStr();

  // Enter key to add
  document.getElementById('p-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') addProblem();
  });

  render();
</script>
</body>
</html>
